<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jayGram - Modern & Fixed Replies</title>
    
    <link rel="icon" type="image/jpg" href="https://i.pinimg.com/736x/af/a3/24/afa324ff15091f93624bb470d60a592.jpg">
    <link rel="apple-touch-icon" href="https://i.pinimg.com/736x/af/a3/24/afa324ff15091f93624bb470d60a592.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="jayGram">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f8;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .page {
            display: none; min-height: 100vh; width: 100vw;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; flex-direction: column; align-items: center; padding-bottom: 100px;
        }

        .active { display: flex; }

        /* --- PAGE CONNEXION --- */
        #page-connexion { 
            background-image: url('https://i.pinimg.com/originals/fb/4f/c9/fb4fc97e9ae190c742cfc1a9b90a9fb6.gif') !important; 
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 30px;
            border: 2px solid rgba(255, 20, 147, 0.3);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.15);
            width: 90%; max-width: 380px; margin-top: 20px; text-align: center;
            overflow: hidden; 
        }

        #page-connexion .card {
            background-image: url('https://i.pinimg.com/736x/b5/b9/4f/b5b94fabccd27310047fc3743ecedbe6.jpg');
            background-size: cover; image-rendering: pixelated; border: 5px solid #FF1493;
            border-radius: 0px; padding: 40px; width: 320px;
        }

        .btn-pixel {
            width: 100%; border: 4px solid #FF1493; color: #FF1493; font-weight: bold;
            text-transform: uppercase; padding: 15px; cursor: pointer; border-radius: 0px;
            background: linear-gradient(to bottom, #ffffff 0%, #ffffff 25%, #ffdae9 25%, #ffdae9 50%, #ffb6c1 50%, #ffb6c1 75%, #ff69b4 75%, #ff69b4 100% );
            image-rendering: pixelated; box-shadow: 4px 4px 0px #FF1493;
        }

        #profile-pic-preview, .profile-pic-small, #profil-pic-big, #nav-mini-pp, .chat-pp-mini { border-radius: 50% !important; }

        .pfp-container { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; z-index: 2; }
        
        .pfp-deco {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 180px; 
            height: 180px;
            z-index: 10; 
            object-fit: contain;
            cursor: move;
            user-select: none;
            touch-action: none;
        }

        .deco-mini {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            object-fit: contain;
        }

        /* --- STICKERS --- */
        .sticker {
            display: inline-block;
            width: 20px; height: 20px;
            vertical-align: middle;
            margin-left: 5px;
            object-fit: contain;
        }

        .navbar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-top: 2px solid rgba(255, 20, 147, 0.2);
            display: none; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-icon { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid #FF1493; }
        .nav-item { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; align-items: center; position: relative; }
        .nav-item span { font-size: 10px; color: #FF1493; font-weight: bold; margin-top: 2px; }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: 5px;
            background-color: #ff4d4d;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid white;
            display: none; 
            z-index: 1001;
        }

        .contact-badge {
            background-color: #ff4d4d;
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            border: 1px solid white;
        }

        .post { 
            background: white; border: 1px solid rgba(255, 20, 147, 0.2); border-radius: 25px; 
            padding: 15px; margin: 15px 0; width: 90%; max-width: 380px; text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative;
        }

        .post-header { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #ffdae9; padding-bottom: 5px; justify-content: space-between;}
        .profile-pic-small { width: 40px; height: 40px; object-fit: cover; border: 2px solid #FF1493; margin-right: 10px; background: white; cursor: pointer;}
        .post-img, .post-video { width: 100%; border-radius: 15px; margin-top: 10px; cursor: pointer; }
        .post-actions { margin-top: 10px; display: flex; gap: 15px; font-weight: bold; color: #FF1493; cursor: pointer; font-size: 13px; }
        
        .comment-section { border-top: 1px solid #ffdae9; margin-top: 10px; padding-top: 10px; }
        .comment { font-size: 13px; margin-bottom: 8px; color: #5d4037; position: relative; }
        .comment-user { font-weight: bold; color: #FF1493; }
        .reply-btn { background: none; border: none; color: #ff69b4; font-size: 10px; cursor: pointer; text-decoration: underline; padding-left: 5px; }
        .del-btn { background: none; border: none; color: #ff4d4d; font-size: 10px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        
        .replies-container { 
            margin-left: 30px !important; 
            border-left: 2px solid #ffdae9; 
            padding-left: 12px; 
            margin-top: 8px; 
        }
        
        .comment-input-area { display: flex; gap: 5px; margin-top: 8px; }
        .comment-input-area input { flex: 1; padding: 10px; border: 1px solid #ffdae9; border-radius: 20px; font-size: 12px; background: #fffcfd; }
        .comment-input-area button { background: #FF1493; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; padding: 0 10px; }

        .banner-container {
            width: calc(100% + 50px); height: 100px; margin: -25px -25px 50px -25px;
            background: #ffdae9; position: relative; border-bottom: 2px solid #FF1493;
            overflow: visible; 
        }
        #profil-banner-img { width: 100%; height: 100%; object-fit: cover; }
        #profil-pic-big { width: 100%; height: 100%; border: 4px solid white; object-fit: cover; background: white; cursor: pointer; }

        #profil-bio { font-size: 14px; color: #7a5c61; margin: 10px 0; font-style: italic; }
        .btn-bio { background: #FF1493; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-deco, .btn-sticker { background: #ffdae9; color: #FF1493; border: 1px solid #FF1493; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; margin-left: 5px; vertical-align: middle; }

        .msg-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffdae9; padding-bottom: 10px; margin-bottom: 15px; }
        .msg-btn { background: #FF1493; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #group-popup, #group-profile-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid #FF1493; border-radius: 30px; padding: 25px;
            z-index: 2000; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        #page-accueil, #page-search, #page-messages, #page-profil { background-image: url('https://i.pinimg.com/736x/dc/12/c8/dc12c8629ff2c1330a2270047616e8d8.jpg'); }

        input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ffdae9; border-radius: 15px; box-sizing: border-box; color: #FF1493; background: #fffcfd; }
        #profile-pic-preview { width: 120px; height: 120px; object-fit: cover; border: 4px solid #FF1493; margin: 0 auto 15px auto; display: none; background: white; }

        /* --- STYLE CHAT PRIVÉ --- */
        #chat-window {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid #FF1493; border-radius: 25px; width: 90%; max-width: 350px;
            height: 450px; z-index: 3000; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        #chat-header { background: #FF1493; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #fff5f8; display: flex; flex-direction: column; gap: 8px; background-size: cover; background-position: center; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; z-index: 2; display: flex; flex-direction: column; position: relative; }
        .msg-me { background: #FF1493; color: white; align-self: flex-end; align-items: flex-end;}
        .msg-them { background: #ffdae9; color: #FF1493; align-self: flex-start; }
        .chat-img, .chat-video { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid white; }
        .del-msg-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .chat-pp-mini-container {
            position: relative;
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            border: 2px solid white;
            overflow: visible; 
        }
        .chat-pp-mini {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cert-badge { color: #1DA1F2; cursor: pointer; font-size: 14px; margin-left: 5px; vertical-align: middle; }
        .repost-badge { font-size: 10px; color: #888; margin-bottom: 5px; font-weight: bold; display: block; }

        .follow-btn {
            background: #FF1493; color: white; border: none; padding: 4px 10px; border-radius: 12px;
            font-size: 10px; cursor: pointer; font-weight: bold; margin-left: 8px;
        }
        .follow-btn.followed { background: #ccc; cursor: default; }

        /* --- STYLE PLEIN ÉCRAN VIDÉO (OPTIMISÉ PC) --- */
        #video-fullscreen-overlay {
            display: none; position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: black; z-index: 9999; flex-direction: column; overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .fullscreen-video-container {
            width: 100vw; height: 100vh; position: relative;
            scroll-snap-align: start; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        .fullscreen-video-container video {
            max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain;
        }
        .video-ui-overlay {
            position: absolute; bottom: 40px; left: 20px; right: 20px;
            color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; max-width: 500px;
        }
        .video-ui-overlay * { pointer-events: auto; }
        .close-video-btn {
            position: fixed; top: 20px; right: 20px; color: white; font-size: 30px;
            cursor: pointer; z-index: 10000; text-shadow: 0 0 5px black;
        }

        /* Music Badge styles */
        .music-indicator {
            font-size: 10px;
            color: #FF1493;
            background: #ffdae9;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 5px;
        }

    </style>
</head>
<body>

    <div id="video-fullscreen-overlay">
        <span class="close-video-btn" onclick="closeVideoFullscreen()">✖</span>
    </div>

    <div id="page-connexion" class="page active">
        <div class="card">
            <h2 style="color: #FF1493; text-shadow: 2px 2px 0px white;">CONNEXION</h2>
            <form id="loginForm">
                <img id="profile-pic-preview" src="">
                <label style="color:#FF1493; font-size:11px; font-weight:bold;">PHOTO DE PROFIL :</label>
                <input type="file" id="profileImageInput" accept="image/*" onchange="previewProfilePic()" style="font-size:10px; margin-bottom:10px;">
                <input type="text" id="username" placeholder="PSEUDO" required>
                <input type="password" id="password" placeholder="MOT DE PASSE" required>
                <button type="submit" class="btn-pixel">VALIDER</button>
            </form>
        </div>
    </div>

    <div id="page-accueil" class="page">
        <div class="card">
            <textarea id="postText" placeholder="Partage ta journée..."></textarea>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                <input type="file" id="postMedia" accept="image/*,video/*" style="flex: 1;">
                <button onclick="document.getElementById('postAudio').click()" style="background:#ffdae9; border:2px solid #FF1493; border-radius:50%; width:40px; height:40px; cursor:pointer; color:#FF1493; font-weight:bold;">♫</button>
                <input type="file" id="postAudio" accept="audio/mp3,audio/*" hidden onchange="alert('Musique ajoutée !')">
            </div>
            <button onclick="creerPost()" style="background:#FF1493; color:white; border:none; padding:12px; width:100%; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:10px;">PUBLIER</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="page-search" class="page"><div class="card"><h2>RECHERCHE</h2><input type="text" placeholder="🔍 Pixel search..."></div></div>

    <div id="page-messages" class="page">
        <div class="card">
            <div class="msg-header">
                <h2 style="color:#FF1493; margin:0;">MESSAGES</h2>
                <div style="display:flex; gap:10px;">
                    <button id="admin-bg-btn" class="msg-btn" style="display:none;" onclick="document.getElementById('mainBgInput').click()">🎨</button>
                    <input type="file" id="mainBgInput" hidden accept="image/*" onchange="changeMainBackground()">
                    <button class="msg-btn" onclick="toggleSearchFriend()">+</button>
                    <button class="msg-btn" onclick="toggleGroupPopup()">*</button>
                </div>
            </div>
            <div id="search-friend-bar" style="display:none; margin-bottom:15px;">
                <input type="text" id="friend-search-input" placeholder="Rechercher un pseudo...">
            </div>
            <div id="online-users-list"></div>
            <div id="groups-list"></div>
            <p id="no-msg-text" style="color:#999; font-size: 14px;">Connecte-toi pour voir les autres.</p>
        </div>
    </div>

    <div id="chat-window">
        <div id="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="chat-pp-mini-container" id="chat-header-pp-box">
                    <img id="chat-header-pp" class="chat-pp-mini" src="">
                    <div id="chat-header-deco-layer" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
                </div>
                <span id="chat-with-name">@User</span>
                <button onclick="document.getElementById('chatBgInput').click()" style="background:none; border:none; cursor:pointer; font-size:18px;" title="Changer fond d'écran">🖼️</button>
                <input type="file" id="chatBgInput" hidden accept="image/*" onchange="changeChatBackground()">
            </div>
            <span onclick="closeChat()" style="cursor:pointer;">✖</span>
        </div>
        <div id="chat-messages"></div>
        <div class="comment-input-area" style="padding: 10px; background: white;">
            <input type="text" id="chat-input" placeholder="Ton message...">
            <button onclick="document.getElementById('chatMediaInput').click()" style="background:none; border:none; font-size:20px; cursor:pointer;">📷</button>
            <input type="file" id="chatMediaInput" hidden accept="image/*,video/*" onchange="sendPrivateMedia()">
            <button onclick="ajouterStickerChat()" style="background:none; border:none; font-size:20px; cursor:pointer;">🏷️</button>
            <button onclick="sendPrivateMsg()">OK</button>
        </div>
    </div>

    <div id="group-popup">
        <h3 style="color:#FF1493; margin-top:0;">CRÉER UN GROUPE</h3>
        <input type="text" id="new-group-name" placeholder="Nom du groupe...">
        <div id="users-list-group" style="max-height:150px; overflow-y:auto; border:1px solid #ffdae9; border-radius:10px; margin:10px 0;"></div>
        <button onclick="validerGroupe()" style="background:#FF1493; color:white; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; margin-top:15px;">CRÉER LE GROUPE</button>
        <button onclick="toggleGroupPopup()" style="background:none; border:none; color:#FF1493; font-size:10px; text-decoration:underline; cursor:pointer; margin-top:10px;">ANNULER</button>
    </div>

    <div id="group-profile-popup">
        <h3 style="color:#FF1493; margin-top:0;">PROFIL DU GROUPE</h3>
        <img id="group-pp-preview" src="https://via.placeholder.com/100" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #FF1493; margin-bottom:10px;">
        <input type="file" id="group-pp-input" accept="image/*" onchange="previewGroupPic()" style="font-size:10px; margin-bottom:10px;">
        <input type="text" id="edit-group-name" placeholder="Nom du groupe">
        <button onclick="sauvegarderProfilGroupe()" style="background:#FF1493; color:white; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px;">SAUVEGARDER</button>
        <button onclick="supprimerGroupe()" style="background:#ff4d4d; color:white; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px;">SUPPRIMER LE GROUPE</button>
        <button onclick="document.getElementById('group-profile-popup').style.display='none'" style="background:none; border:none; color:#FF1493; font-size:10px; text-decoration:underline; cursor:pointer; margin-top:10px;">FERMER</button>
    </div>

    <div id="page-profil" class="page">
        <div class="card">
            <div class="banner-container" id="banner-box">
                <img id="profil-banner-img" src="https://i.pinimg.com/736x/8d/e2/2e/8de22e28372652155d3b64c185e33433.jpg">
                <div id="deco-container-layer" style="position: absolute; top:0; left:0; width:100%; height:100%;"></div>
                <div class="pfp-container">
                    <img id="profil-pic-big" src="" onclick="document.getElementById('changePfpInput').click()">
                    <input type="file" id="changePfpInput" hidden accept="image/*" onchange="changePfpAfterLogin()">
                </div>
                <input type="file" id="bannerInput" hidden accept="image/*" onchange="changeBanner()">
            </div>
            <h2 style="color:#FF1493; margin:10px 0 0 0;"><span id="profil-name">@USER</span> <span id="cert-icon" class="cert-badge" onclick="demanderCertification()">✔</span></h2>
            <div id="profil-bio">Ajoute une biographie...</div>
            <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
                <button id="edit-bio-btn" class="btn-bio" onclick="modifierBio()">MODIFIER BIO</button>
                <button id="bio-sticker-btn" class="btn-sticker" onclick="modifierStickerBio()">🏷️</button>
                <button id="edit-deco-btn" class="btn-deco" onclick="modifierDeco()">✨ +</button>
                <button id="clear-deco-btn" class="btn-deco" onclick="toutSupprimerDeco()" style="background:#ff4d4d; color:white; border:none;">🗑️</button>
            </div>
            <div style="display:flex; justify-content:space-around; margin:20px 0; border-top: 1px solid rgba(0,0,0,0.05); padding-top:15px;">
                <div><b id="count-post" style="color:#FF1493; font-size:20px;">0</b><br><small>POSTS</small></div>
                <div><b id="count-followers" style="color:#FF1493; font-size:20px;">0</b><br><small>FOLLOWERS</small></div>
                <div><b id="total-likes" style="color:#FF1493; font-size:20px;">0</b><br><small>LIKES</small></div>
            </div>
            <button id="logout-btn" onclick="logout()" style="background:#f5f5f5; border:none; padding:10px; font-size:11px; width:60%; border-radius:10px; cursor:pointer; color:#888;">DECONNEXION</button>
        </div>
        <div id="profil-feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <nav class="navbar" id="main-nav">
        <button class="nav-item" onclick="showPage('page-accueil')"><img src="https://i.pinimg.com/1200x/f3/9a/0d/f39a0d06b747ffd7ec2fb4b4170afc72.jpg" class="nav-icon"><span>Home</span></button>
        <button class="nav-item" onclick="showPage('page-search')"><img src="https://i.pinimg.com/1200x/08/73/0b/08730b6f81bdc2177804f101abdfe1a9.jpg" class="nav-icon"><span>Search</span></button>
        <button class="nav-item" onclick="showPage('page-messages')">
            <div id="inbox-notif" class="notif-badge">0</div>
            <img src="https://i.pinimg.com/736x/bd/19/34/bd1934ff714ca0abcd7a2169ee75e014.jpg" class="nav-icon">
            <span>Inbox</span>
        </button>
        <button class="nav-item" onclick="showPage('page-profil')"><div id="nav-mini-pp" style="width:45px; height:45px; border:2px solid #FF1493; display:flex; align-items:center; justify-content:center; overflow:hidden;">👤</div><span>Moi</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHMUs0fOGnAAZegvWlQ0xt_hITgBTHMQ", authDomain: "jaygram-e7fc2.firebaseapp.com",
            databaseURL: "https://jaygram-e7fc2-default-rtdb.firebaseio.com", projectId: "jaygram-e7fc2",
            storageBucket: "jaygram-e7fc2.firebasestorage.app", messagingSenderId: "372548325413",
            appId: "1:372548325413:web:572438635da623fb33efcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = ""; window.currentProfilePic = ""; let chatTarget = ""; let selectedUsers = [];
        window.isCertified = false;
        let activeDecos = []; 
        let isGroupChat = false;

        function gererNotifications() {
            const mainBadge = document.getElementById('inbox-notif');
            onValue(ref(db), (snapshot) => {
                let totalNonLus = 0;
                const dms = snapshot.child('direct_messages').val();
                const groups = snapshot.child('groups').val();
                const groupMsgs = snapshot.child('group_messages').val();
                let countsByChat = {};
                if(dms) {
                    Object.keys(dms).forEach(chatId => {
                        if(chatId.includes(window.currentUser)) {
                            const lastRead = localStorage.getItem(`last_read_${chatId}_${window.currentUser}`) || 0;
                            let unread = 0;
                            Object.values(dms[chatId]).forEach(m => {
                                if(m.timestamp > lastRead && m.sender !== window.currentUser) unread++;
                            });
                            countsByChat[chatId] = unread;
                            totalNonLus += unread;
                        }
                    });
                }
                if(groups && groupMsgs) {
                    Object.keys(groups).forEach(gid => {
                        if(groups[gid].members && groups[gid].members.includes(window.currentUser)) {
                            const lastRead = localStorage.getItem(`last_read_${gid}_${window.currentUser}`) || 0;
                            let unread = 0;
                            if(groupMsgs[gid]) {
                                Object.values(groupMsgs[gid]).forEach(m => {
                                    if(m.timestamp > lastRead && m.sender !== window.currentUser) unread++;
                                });
                            }
                            countsByChat[gid] = unread;
                            totalNonLus += unread;
                        }
                    });
                }
                if (totalNonLus > 0 && !document.getElementById('page-messages').classList.contains('active')) {
                    mainBadge.innerText = totalNonLus > 99 ? "99+" : totalNonLus;
                    mainBadge.style.display = "block";

                }
                updateIndividualBadges(countsByChat);
            });
        }

        function creerElementDeco(data, container, editable, index, profileOwner) {
            const img = document.createElement('img');
            img.src = data.url; img.className = 'pfp-deco';
            let decoObj = { url: data.url, x: data.x || 0, y: data.y || 0, scale: data.scale || 1.5 };
            img.style.transform = `translate(${decoObj.x}px, ${decoObj.y}px) scale(${decoObj.scale})`;
            container.appendChild(img);
            activeDecos.push(decoObj);
            if(editable) {
                let isDragging = false; let startX, startY;
                const onStart = (e) => {
                    isDragging = true;
                    const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                    const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                    startX = cx - decoObj.x; startY = cy - decoObj.y;
                    img.style.zIndex = 1000;
                };
                const onMove = (e) => {
                    if(!isDragging) return;
                    const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                    const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                    decoObj.x = cx - startX; decoObj.y = cy - startY;
                    img.style.transform = `translate(${decoObj.x}px, ${decoObj.y}px) scale(${decoObj.scale})`;
                };
                const onEnd = () => { if(isDragging) { isDragging = false; img.style.zIndex = 10; sauvegarderDecosFirebase(); } };
                img.addEventListener('mousedown', onStart); img.addEventListener('touchstart', onStart);
                window.addEventListener('mousemove', onMove); window.addEventListener('touchmove', onMove, {passive: false});
                window.addEventListener('mouseup', onEnd); window.addEventListener('touchend', onEnd);
                img.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    decoObj.scale += e.deltaY > 0 ? -0.1 : 0.1;
                    decoObj.scale = Math.min(Math.max(0.2, decoObj.scale), 5);
                    img.style.transform = `translate(${decoObj.x}px, ${decoObj.y}px) scale(${decoObj.scale})`;
                    sauvegarderDecosFirebase();
                }, { passive: false });
                img.addEventListener('dblclick', () => {
                    if(confirm("Supprimer cette déco ?")) { activeDecos = activeDecos.filter(d => d !== decoObj); img.remove(); sauvegarderDecosFirebase(); }
                });
            }
        }

        function chargerCommentaires(postId) {
            onValue(ref(db, `posts/${postId}/comments`), (snapshot) => {
                const list = document.getElementById(`comments-list-${postId}`); if(!list) return;
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const c = child.val(); const cid = child.key;
                    const delBtn = (c.user === window.currentUser || window.isCertified) ? `<button class="del-btn" onclick="deleteComment('${postId}', '${cid}')">✖</button>` : '';
                    const div = document.createElement('div');

                    div.innerHTML = `<span class="comment-user">@${c.user}</span>: ${c.text} ${delBtn} <button class="reply-btn" onclick="showReply('${cid}', '${postId}')">Répondre</button><div id="replies-${cid}" class="replies-container"></div><div id="reply-box-${cid}"></div>`;
                    list.appendChild(div);
                    if(c.replies) {
                        const repCont = div.querySelector(`#replies-${cid}`);
                        Object.keys(c.replies).forEach(rid => {
                            const r = c.replies[rid];
                            const rDelBtn = (r.user === window.currentUser || window.isCertified) ? `<button class="del-btn" onclick="deleteComment('${postId}', '${cid}', '${rid}')">✖</button>` : '';
                            repCont.innerHTML += `<div class="comment"><span class="comment-user">@${r.user}</span>: ${r.text} ${rDelBtn}</div>`;
                        });
                    }
                });
            });
        }

        window.deleteComment = (pid, cid, rid = null) => {
            if(!confirm("Supprimer ce commentaire ?")) return;
            const path = rid ? `posts/${pid}/comments/${cid}/replies/${rid}` : `posts/${pid}/comments/${cid}`;
            remove(ref(db, path));
        }

        window.showPage = (id, force = false) => { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'page-profil' && !force) { voirProfil(window.currentUser, window.currentProfilePic); }
            if (id === 'page-messages') { document.getElementById('inbox-notif').style.display = "none"; }
        }
        
        window.modifierBio = () => { let n = prompt("Ta nouvelle bio ?"); if (n) set(ref(db, 'users/' + window.currentUser + '/bio'), n); }
        window.modifierStickerBio = () => { let s = prompt("Lien stickers (séparés par ,) :"); if(s !== null) set(ref(db, 'users/' + window.currentUser + '/stickerBio'), s); }
        window.modifierDeco = () => { 
            let d = prompt("Lien URL PNG :"); if(d) {
                const layer = document.getElementById('deco-container-layer');
                creerElementDeco({url: d, x: 0, y: 0, scale: 1.5}, layer, true, activeDecos.length, window.currentUser);
                sauvegarderDecosFirebase();
            }
        }
        window.toutSupprimerDeco = () => { if(confirm("Tout supprimer ?")) { activeDecos = []; sauvegarderDecosFirebase(); document.getElementById('deco-container-layer').innerHTML = ""; } }
        window.logout = () => { localStorage.removeItem('nookgram_user'); localStorage.removeItem('nookgram_pass'); location.reload(); }

        window.changeBanner = () => {
            const file = document.getElementById('bannerInput').files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (e) => { update(ref(db, 'users/' + window.currentUser), { banner: e.target.result }); };
                reader.readAsDataURL(file);
            }
        }

        window.changePfpAfterLogin = () => {
            const file = document.getElementById('changePfpInput').files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = async (e) => { 
                    const newPic = e.target.result; window.currentProfilePic = newPic;
                    document.getElementById('profil-pic-big').src = newPic;
                    document.getElementById('nav-mini-pp').innerHTML = `<img src="${newPic}" style="width:100%; height:100%; object-fit:cover;">`;
                    await update(ref(db, 'users/' + window.currentUser), { pp: newPic });
                    const postsSnap = await get(ref(db, 'posts'));
                    if(postsSnap.exists()){ postsSnap.forEach(child => { if(child.val().user === window.currentUser){ update(ref(db, 'posts/' + child.key), { pp: newPic }); } }); }
                };
                reader.readAsDataURL(file);
            }
        }

        function écouterUtilisateurs() {
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById('online-users-list');
                const groupList = document.getElementById('users-list-group');
                list.innerHTML = ""; groupList.innerHTML = "";
                snapshot.forEach(child => {
                    const u = child.val();
                    if(u.name !== window.currentUser) {
                        const userRow = document.createElement('div');
                        userRow.className = "user-row-msg";
                        userRow.setAttribute('data-user', u.name);
                        userRow.style = "padding:10px; color:#FF1493; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #fff0f5;";
                        const profileLink = document.createElement('div');
                        profileLink.style = "display:flex; align-items:center; cursor:pointer;";
                        profileLink.onclick = () => voirProfil(u.name, u.pp);
                        profileLink.innerHTML = `<img src="${u.pp}" style="width:35px; height:35px; border-radius:50%; border:2px solid #FF1493; margin-right:10px; object-fit:cover;"><span style="font-weight:bold;">@${u.name}</span>`;
                        const actions = document.createElement('div');
                        actions.style = "display:flex; align-items:center;";
                        let modBtn = window.isCertified ? `<button onclick="deleteAccount('${u.name}')" style="background:#ff4d4d; color:white; border:none; border-radius:10px; padding:5px; cursor:pointer; margin-left:5px;">🚫</button>` : '';
                        actions.innerHTML = `<div class="contact-badge" style="display:none;">0</div><button onclick="openChat('${u.name}')" style="background:#FF1493; color:white; border:none; border-radius:10px; padding:5px 10px; cursor:pointer;">✉️</button>${modBtn}`;
                        userRow.appendChild(profileLink); userRow.appendChild(actions); list.appendChild(userRow);
                        groupList.innerHTML += `<div class="user-option" onclick="selectUserForGroup(this, '${u.name}')" style="padding:10px; cursor:pointer; color:#FF1493; font-weight:bold; border-radius:10px;">@${u.name}</div>`;
                    }
                });
            });
        }

        window.deleteAccount = (username) => { if(confirm("DÉTRUIRE LE COMPTE ?")) remove(ref(db, 'users/' + username)); }

        function renderMessage(m, mid, path) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${m.sender === window.currentUser ? 'msg-me' : 'msg-them'}`;
            let content = ``;
            if(isGroupChat && m.sender !== window.currentUser) content += `<small style="font-size:9px; opacity:0.7;">${m.sender}</small>`;
            if(m.text) content += `<div>${m.text}</div>`;
            if(m.photo) content += `<img src="${m.photo}" class="chat-img">`;
            if(m.video) content += `<video src="${m.video}" class="chat-video" controls></video>`;
            if(m.sticker) content += `<img src="${m.sticker}" class="sticker">`;
            if(m.sender === window.currentUser || window.isCertified) { content += `<button class="del-msg-btn" onclick="deleteMsg('${path}', '${mid}')">✖</button>`; }
            div.innerHTML = content; document.getElementById('chat-messages').appendChild(div);
        }

        window.deleteMsg = (path, mid) => { if(confirm("Supprimer ?")) remove(ref(db, path + '/' + mid)); }
        
        window.sendPrivateMsg = function() {
            const input = document.getElementById('chat-input');
            if (!input.value && !window.currentChatSticker) return;
            const msgData = { sender: window.currentUser, text: input.value, sticker: window.currentChatSticker || "", timestamp: Date.now() };
            if(isGroupChat) { push(ref(db, 'group_messages/' + currentGroupId), msgData); } else {
                const chatId = [window.currentUser, chatTarget].sort().join("_");
                push(ref(db, 'direct_messages/' + chatId), msgData);
            }
            input.value = ""; window.currentChatSticker = "";
        }

        window.closeChat = () => document.getElementById('chat-window').style.display = "none";
        window.toggleGroupPopup = () => { let p = document.getElementById('group-popup'); p.style.display = (p.style.display === 'none') ? 'block' : 'none'; selectedUsers = []; document.querySelectorAll('.user-option').forEach(el => el.style.background = 'none'); }
        window.selectUserForGroup = (el, name) => { if (selectedUsers.includes(name)) { selectedUsers = selectedUsers.filter(x => x !== name); el.style.background = 'none'; } else { selectedUsers.push(name); el.style.background = '#ffdae9'; } }
        window.validerGroupe = () => {
            const name = document.getElementById('new-group-name').value;
            if(!name || selectedUsers.length === 0) return alert("Nom et membres requis !");
            const members = [...selectedUsers, window.currentUser];
            const groupRef = push(ref(db, 'groups'));
            set(groupRef, { id: groupRef.key, name: name, pp: "https://via.placeholder.com/100", members: members, owner: window.currentUser });
            document.getElementById('new-group-name').value = ""; toggleGroupPopup();
        }

        function écouterGroupes() {
            onValue(ref(db, 'groups'), (snap) => {
                const list = document.getElementById('groups-list'); list.innerHTML = "";
                snap.forEach(child => {
                    const g = child.val();
                    if(g.members && g.members.includes(window.currentUser)) {
                        const row = document.createElement('div');
                        row.className = "group-row-msg"; row.setAttribute('data-id', g.id);
                        row.style = "padding:10px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #fff0f5;";
                        row.innerHTML = `<div style="display:flex; align-items:center; cursor:pointer;" onclick="ouvrirProfilGroupe('${g.id}')"><img src="${g.pp}" style="width:35px; height:35px; border-radius:50%; border:2px solid #FF1493; margin-right:10px; object-fit:cover;"><span style="font-weight:bold; color:#FF1493;">${g.name}</span></div><div style="display:flex; align-items:center;"><div class="contact-badge" style="display:none;">0</div><button onclick="openChat('${g.id}', true)" style="background:#FF1493; color:white; border:none; border-radius:10px; padding:5px 10px; cursor:pointer;">✉️</button></div>`;
                        list.appendChild(row);
                    }
                });
            });
        }

        window.ouvrirProfilGroupe = (id) => {
            currentGroupId = id;
            get(ref(db, 'groups/' + id)).then(snap => {
                const g = snap.val();
                document.getElementById('edit-group-name').value = g.name; document.getElementById('group-pp-preview').src = g.pp;
                document.getElementById('group-profile-popup').style.display = 'block';
            });
        }

        window.previewGroupPic = () => {
            const file = document.getElementById('group-pp-input').files[0];
            if(file) { const reader = new FileReader(); reader.onload = (e) => document.getElementById('group-pp-preview').src = e.target.result; reader.readAsDataURL(file); }
        }

        window.sauvegarderProfilGroupe = () => {
            const newName = document.getElementById('edit-group-name').value;
            const newPp = document.getElementById('group-pp-preview').src;
            update(ref(db, 'groups/' + currentGroupId), { name: newName, pp: newPp });
            document.getElementById('group-profile-popup').style.display = 'none';
        }

        window.supprimerGroupe = () => { if(confirm("Supprimer ?")) { remove(ref(db, 'groups/' + currentGroupId)); document.getElementById('group-profile-popup').style.display = 'none'; } }
        window.toggleSearchFriend = () => { let b = document.getElementById('search-friend-bar'); b.style.display = (b.style.display === 'none') ? 'block' : 'none'; }
        window.ajouterStickerChat = () => { let s = prompt("Lien du sticker :"); if(s) window.currentChatSticker = s; }
        
        window.sendPrivateMedia = () => {
            const file = document.getElementById('chatMediaInput').files[0]; if(!file) return;
            const isVideo = file.type.startsWith('video/');
            const reader = new FileReader(); reader.onload = (e) => {
                const msgData = { sender: window.currentUser, timestamp: Date.now() };
                if(isVideo) msgData.video = e.target.result; else msgData.photo = e.target.result;
                if(isGroupChat) push(ref(db, 'group_messages/' + currentGroupId), msgData); else {
                    const chatId = [window.currentUser, chatTarget].sort().join("_");
                    push(ref(db, 'direct_messages/' + chatId), msgData);
                }
            }; reader.readAsDataURL(file);
        }

    </script>
</body>
</html>
