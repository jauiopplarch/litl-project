<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jayGram - Modern & Fixed Replies</title>
    
    <link rel="icon" type="image/jpg" href="https://i.pinimg.com/736x/af/a3/24/afa324dff15091f93624bb470d60a592.jpg">
    <link rel="apple-touch-icon" href="https://i.pinimg.com/736x/af/a3/24/afa324dff15091f93624bb470d60a592.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="jayGram">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f8;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .page {
            display: none; min-height: 100vh; width: 100vw;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; flex-direction: column; align-items: center; padding-bottom: 100px;
        }

        .active { display: flex; }

        /* --- PAGE CONNEXION --- */
        #page-connexion { 
            background-image: url('https://i.pinimg.com/originals/fb/4f/c9/fb4fc97e9ae190c742cfc1a9b90a9fb6.gif') !important; 
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 30px;
            border: 2px solid rgba(255, 20, 147, 0.3);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.15);
            width: 90%; max-width: 380px; margin-top: 20px; text-align: center;
            overflow: hidden; 
        }

        #page-connexion .card {
            background-image: url('https://i.pinimg.com/736x/b5/b9/4f/b5b94fabccd27310047fc3743ecedbe6.jpg');
            background-size: cover; image-rendering: pixelated; border: 5px solid #FF1493;
            border-radius: 0px; padding: 40px; width: 320px;
        }

        .btn-pixel {
            width: 100%; border: 4px solid #FF1493; color: #FF1493; font-weight: bold;
            text-transform: uppercase; padding: 15px; cursor: pointer; border-radius: 0px;
            background: linear-gradient(to bottom, #ffffff 0%, #ffffff 25%, #ffdae9 25%, #ffdae9 50%, #ffb6c1 50%, #ffb6c1 75%, #ff69b4 75%, #ff69b4 100% );
            image-rendering: pixelated; box-shadow: 4px 4px 0px #FF1493;
        }

        #profile-pic-preview, .profile-pic-small, #profil-pic-big, #nav-mini-pp { border-radius: 50% !important; }

        .pfp-container { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; }
        .pfp-deco {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            pointer-events: none; z-index: 5; object-fit: contain;
        }

        /* --- STICKERS --- */
        .sticker {
            display: inline-block;
            width: 20px; height: 20px;
            vertical-align: middle;
            margin-left: 5px;
            object-fit: contain;
        }

        .navbar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-top: 2px solid rgba(255, 20, 147, 0.2);
            display: none; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-icon { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid #FF1493; }
        .nav-item { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item span { font-size: 10px; color: #FF1493; font-weight: bold; margin-top: 2px; }

        .post { 
            background: white; border: 1px solid rgba(255, 20, 147, 0.2); border-radius: 25px; 
            padding: 15px; margin: 15px 0; width: 90%; max-width: 380px; text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative;
        }

        .post-header { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #ffdae9; padding-bottom: 5px; justify-content: space-between;}
        .profile-pic-small { width: 40px; height: 40px; object-fit: cover; border: 2px solid #FF1493; margin-right: 10px; background: white; cursor: pointer;}
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        .post-actions { margin-top: 10px; display: flex; gap: 15px; font-weight: bold; color: #FF1493; cursor: pointer; font-size: 13px; }
        
        .comment-section { border-top: 1px solid #ffdae9; margin-top: 10px; padding-top: 10px; }
        .comment { font-size: 13px; margin-bottom: 8px; color: #5d4037; position: relative; }
        .comment-user { font-weight: bold; color: #FF1493; }
        .reply-btn { background: none; border: none; color: #ff69b4; font-size: 10px; cursor: pointer; text-decoration: underline; padding-left: 5px; }
        .del-btn { background: none; border: none; color: #ff4d4d; font-size: 10px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        
        .replies-container { 
            margin-left: 30px !important; 
            border-left: 2px solid #ffdae9; 
            padding-left: 12px; 
            margin-top: 8px; 
        }
        
        .comment-input-area { display: flex; gap: 5px; margin-top: 8px; }
        .comment-input-area input { flex: 1; padding: 10px; border: 1px solid #ffdae9; border-radius: 20px; font-size: 12px; background: #fffcfd; }
        .comment-input-area button { background: #FF1493; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; padding: 0 10px; }

        .banner-container {
            width: calc(100% + 50px); height: 100px; margin: -25px -25px 50px -25px;
            background: #ffdae9; position: relative; border-bottom: 2px solid #FF1493;
        }
        #profil-banner-img { width: 100%; height: 100%; object-fit: cover; }
        #profil-pic-big { width: 100%; height: 100%; border: 4px solid white; object-fit: cover; background: white; cursor: pointer; }

        #profil-bio { font-size: 14px; color: #7a5c61; margin: 10px 0; font-style: italic; }
        .btn-bio { background: #FF1493; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-deco, .btn-sticker { background: #ffdae9; color: #FF1493; border: 1px solid #FF1493; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; margin-left: 5px; vertical-align: middle; }

        .msg-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffdae9; padding-bottom: 10px; margin-bottom: 15px; }
        .msg-btn { background: #FF1493; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #group-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid #FF1493; border-radius: 30px; padding: 25px;
            z-index: 2000; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        #page-accueil, #page-search, #page-messages, #page-profil { background-image: url('https://i.pinimg.com/736x/dc/12/c8/dc12c8629ff2c1330a2270047616e8d8.jpg'); }

        input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ffdae9; border-radius: 15px; box-sizing: border-box; color: #FF1493; background: #fffcfd; }
        #profile-pic-preview { width: 120px; height: 120px; object-fit: cover; border: 4px solid #FF1493; margin: 0 auto 15px auto; display: none; background: white; }

        /* --- STYLE CHAT PRIVÉ --- */
        #chat-window {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid #FF1493; border-radius: 25px; width: 90%; max-width: 350px;
            height: 450px; z-index: 3000; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        #chat-header { background: #FF1493; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #fff5f8; display: flex; flex-direction: column; gap: 8px; background-size: cover; background-position: center; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; z-index: 2; display: flex; flex-direction: column; position: relative; }
        .msg-me { background: #FF1493; color: white; align-self: flex-end; align-items: flex-end;}
        .msg-them { background: #ffdae9; color: #FF1493; align-self: flex-start; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid white; }
        .del-msg-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* Certification Badge */
        .cert-badge { color: #1DA1F2; cursor: pointer; font-size: 14px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="page-connexion" class="page active">
        <div class="card">
            <h2 style="color: #FF1493; text-shadow: 2px 2px 0px white;">CONNEXION</h2>
            <form id="loginForm">
                <img id="profile-pic-preview" src="">
                <label style="color:#FF1493; font-size:11px; font-weight:bold;">PHOTO DE PROFIL :</label>
                <input type="file" id="profileImageInput" accept="image/*" onchange="previewProfilePic()" style="font-size:10px; margin-bottom:10px;">
                <input type="text" id="username" placeholder="PSEUDO" required>
                <input type="password" id="password" placeholder="MOT DE PASSE" required>
                <button type="submit" class="btn-pixel">VALIDER</button>
            </form>
        </div>
    </div>

    <div id="page-accueil" class="page">
        <div class="card">
            <textarea id="postText" placeholder="Partage ta journée..."></textarea>
            <input type="file" id="postImage" accept="image/*">
            <button onclick="creerPost()" style="background:#FF1493; color:white; border:none; padding:12px; width:100%; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:10px;">PUBLIER</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="page-search" class="page"><div class="card"><h2>RECHERCHE</h2><input type="text" placeholder="🔍 Pixel search..."></div></div>

    <div id="page-messages" class="page">
        <div class="card">
            <div class="msg-header">
                <h2 style="color:#FF1493; margin:0;">MESSAGES</h2>
                <div style="display:flex; gap:10px;">
                    <button id="admin-bg-btn" class="msg-btn" style="display:none;" onclick="document.getElementById('mainBgInput').click()">🎨</button>
                    <input type="file" id="mainBgInput" hidden accept="image/*" onchange="changeMainBackground()">
                    <button class="msg-btn" onclick="toggleSearchFriend()">+</button>
                    <button class="msg-btn" onclick="toggleGroupPopup()">*</button>
                </div>
            </div>
            <div id="search-friend-bar" style="display:none; margin-bottom:15px;">
                <input type="text" id="friend-search-input" placeholder="Rechercher un pseudo...">
            </div>
            <div id="online-users-list"></div>
            <p id="no-msg-text" style="color:#999; font-size: 14px;">Connecte-toi pour voir les autres.</p>
        </div>
    </div>

    <div id="chat-window">
        <div id="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="chat-with-name">@User</span>
                <button onclick="document.getElementById('chatBgInput').click()" style="background:none; border:none; cursor:pointer; font-size:18px;" title="Changer fond d'écran">🖼️</button>
                <input type="file" id="chatBgInput" hidden accept="image/*" onchange="changeChatBackground()">
            </div>
            <span onclick="closeChat()" style="cursor:pointer;">✖</span>
        </div>
        <div id="chat-messages"></div>
        <div class="comment-input-area" style="padding: 10px; background: white;">
            <input type="text" id="chat-input" placeholder="Ton message...">
            <button onclick="document.getElementById('chatPhotoInput').click()" style="background:none; border:none; font-size:20px; cursor:pointer;">📷</button>
            <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="sendPrivatePhoto()">
            <button onclick="ajouterStickerChat()" style="background:none; border:none; font-size:20px; cursor:pointer;">🏷️</button>
            <button onclick="sendPrivateMsg()">OK</button>
        </div>
    </div>

    <div id="group-popup">
        <h3 style="color:#FF1493; margin-top:0;">CRÉER UN GROUPE</h3>
        <div id="users-list-group"></div>
        <button onclick="validerGroupe()" style="background:#FF1493; color:white; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer; width:100%; margin-top:15px;">CRÉER LE GROUPE</button>
        <button onclick="toggleGroupPopup()" style="background:none; border:none; color:#FF1493; font-size:10px; text-decoration:underline; cursor:pointer; margin-top:10px;">ANNULER</button>
    </div>

    <div id="page-profil" class="page">
        <div class="card">
            <div class="banner-container" id="banner-box">
                <img id="profil-banner-img" src="https://i.pinimg.com/736x/8d/e2/2e/8de22e28372652155d3b64c185e33433.jpg">
                <div class="pfp-container">
                    <img id="pfp-decoration-img" class="pfp-deco" src="" style="display:none;">
                    <img id="profil-pic-big" src="" onclick="document.getElementById('changePfpInput').click()" style="position: relative; z-index: 10; cursor: pointer;">
                    <input type="file" id="changePfpInput" hidden accept="image/*" onchange="changePfpAfterLogin()">
                </div>
                <input type="file" id="bannerInput" hidden accept="image/*" onchange="changeBanner()">
            </div>
            <h2 style="color:#FF1493; margin:10px 0 0 0;"><span id="profil-name">@USER</span> <span id="cert-icon" class="cert-badge" onclick="demanderCertification()">✔</span></h2>
            <div id="profil-bio">Ajoute une biographie...</div>
            <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
                <button id="edit-bio-btn" class="btn-bio" onclick="modifierBio()">MODIFIER BIO</button>
                <button id="bio-sticker-btn" class="btn-sticker" onclick="modifierStickerBio()">🏷️</button>
                <button id="edit-deco-btn" class="btn-deco" onclick="modifierDeco()">✨</button>
            </div>
            <div style="display:flex; justify-content:space-around; margin:20px 0; border-top: 1px solid rgba(0,0,0,0.05); padding-top:15px;">
                <div><b id="count-post" style="color:#FF1493; font-size:20px;">0</b><br><small>POSTS</small></div>
                <div><b style="color:#FF1493; font-size:20px;">0</b><br><small>FOLLOWERS</small></div>
                <div><b id="total-likes" style="color:#FF1493; font-size:20px;">0</b><br><small>LIKES</small></div>
            </div>
            <button id="logout-btn" onclick="logout()" style="background:#f5f5f5; border:none; padding:10px; font-size:11px; width:60%; border-radius:10px; cursor:pointer; color:#888;">DECONNEXION</button>
        </div>
        <div id="profil-feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <nav class="navbar" id="main-nav">
        <button class="nav-item" onclick="showPage('page-accueil')"><img src="https://i.pinimg.com/1200x/f3/9a/0d/f39a0d06b747ffd7ec2fb4b4170afc72.jpg" class="nav-icon"><span>Home</span></button>
        <button class="nav-item" onclick="showPage('page-search')"><img src="https://i.pinimg.com/1200x/08/73/0b/08730b6f81bdc2177804f101abdfe1a9.jpg" class="nav-icon"><span>Search</span></button>
        <button class="nav-item" onclick="showPage('page-messages')"><img src="https://i.pinimg.com/736x/bd/19/34/bd1934ff714ca0abcd7a2169ee75e014.jpg" class="nav-icon"><span>Inbox</span></button>
        <button class="nav-item" onclick="showPage('page-profil')"><div id="nav-mini-pp" style="width:45px; height:45px; border:2px solid #FF1493; display:flex; align-items:center; justify-content:center; overflow:hidden;">👤</div><span>Moi</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHMUs0fOGnAAZegvWlQ0xt_hITgBTHMQ", authDomain: "jaygram-e7fc2.firebaseapp.com",
            databaseURL: "https://jaygram-e7fc2-default-rtdb.firebaseio.com", projectId: "jaygram-e7fc2",
            storageBucket: "jaygram-e7fc2.firebasestorage.app", messagingSenderId: "372548325413",
            appId: "1:372548325413:web:572438635da623fb33efcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = ""; window.currentProfilePic = ""; let chatTarget = ""; let selectedUsers = [];
        window.isCertified = false;

        window.onload = () => {
            const savedUser = localStorage.getItem('nookgram_user');
            const savedPass = localStorage.getItem('nookgram_pass');
            if(savedUser && savedPass) verifierEtConnecter(savedUser, savedPass, true);
        };

        window.previewProfilePic = function() {
            const preview = document.getElementById('profile-pic-preview');
            const fileInput = document.getElementById('profileImageInput');
            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.style.display = "block"; window.currentProfilePic = e.target.result; };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            verifierEtConnecter(document.getElementById('username').value.trim(), document.getElementById('password').value, false);
        });

        async function verifierEtConnecter(user, pass, automatic) {
            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.password === pass) {
                    window.currentUser = user; 
                    window.currentProfilePic = data.pp;
                    window.isCertified = data.certified || false;
                    localStorage.setItem('nookgram_user', user); 
                    localStorage.setItem('nookgram_pass', pass);
                    lancerApp();
                } else if(!automatic) alert("Mot de passe incorrect !");
            } else if(!automatic) {
                window.currentUser = user; 
                if(!window.currentProfilePic) window.currentProfilePic = "https://via.placeholder.com/100";
                set(userRef, { 
                    name: user, 
                    password: pass, 
                    pp: window.currentProfilePic, 
                    bio: "Ajoute une biographie...", 
                    deco: "", 
                    stickerBio: "",
                    certified: false,
                    banner: "https://i.pinimg.com/736x/8d/e2/2e/8de22e28372652155d3b64c185e33433.jpg"
                });
                localStorage.setItem('nookgram_user', user); 
                localStorage.setItem('nookgram_pass', pass);
                lancerApp();
            }
        }

        window.lancerApp = function() {
            document.getElementById('page-connexion').classList.remove('active');
            document.getElementById('page-accueil').classList.add('active');
            document.getElementById('main-nav').style.display = "flex";
            document.getElementById('profil-name').innerText = "@" + window.currentUser.toLowerCase();
            document.getElementById('profil-pic-big').src = window.currentProfilePic;
            document.getElementById('nav-mini-pp').innerHTML = `<img src="${window.currentProfilePic}" style="width:100%; height:100%; object-fit:cover;">`;
            chargerPosts(); écouterUtilisateurs();
            calculerStatsProfil(window.currentUser);
            appliquerDroitsCertifies();
            
            // Écouter le fond d'écran global
            onValue(ref(db, 'app_settings/main_bg'), (snap) => {
                const bg = snap.val();
                if(bg) {
                    document.body.style.backgroundImage = `url(${bg})`;
                    // Appliquer aussi aux pages
                    document.querySelectorAll('.page:not(#page-connexion)').forEach(p => {
                        p.style.backgroundImage = `url(${bg})`;
                    });
                }
            });
        }

        window.demanderCertification = function() {
            let pass = prompt("Entrez le mot de passe de certification :");
            if(pass === "GsofFteryrck_12?!Uup") {
                update(ref(db, 'users/' + window.currentUser), { certified: true });
                window.isCertified = true;
                alert("Compte certifié ! Redémarrage...");
                location.reload();
            } else if(pass !== null) {
                alert("Mot de passe incorrect.");
            }
        }

        function appliquerDroitsCertifies() {
            const certIcon = document.getElementById('cert-icon');
            if(window.isCertified) {
                certIcon.style.color = "#FFD700"; 
                certIcon.title = "Compte Officiel";
                document.getElementById('admin-bg-btn').style.display = "flex";
            } else {
                certIcon.style.color = "#1DA1F2";
            }
        }

        window.changeMainBackground = () => {
            if(!window.isCertified) return;
            const file = document.getElementById('mainBgInput').files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (e) => { 
                    const result = e.target.result;
                    set(ref(db, 'app_settings/main_bg'), result); 
                    // Mise à jour immédiate visuelle pour l'admin
                    document.body.style.backgroundImage = `url(${result})`;
                    document.querySelectorAll('.page:not(#page-connexion)').forEach(p => {
                        p.style.backgroundImage = `url(${result})`;
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        window.creerPost = function() {
            const text = document.getElementById('postText').value;
            const imgInput = document.getElementById('postImage');
            if (!text && !imgInput.files[0]) return;
            const postData = { text: text, user: window.currentUser, pp: window.currentProfilePic, timestamp: Date.now(), img: "", likes: 0 };
            if (imgInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { postData.img = e.target.result; push(ref(db, 'posts'), postData); };
                reader.readAsDataURL(imgInput.files[0]);
            } else push(ref(db, 'posts'), postData);
            document.getElementById('postText').value = ""; imgInput.value = "";
        }

        function chargerPosts() {
            onValue(ref(db, 'posts'), (snapshot) => {
                const feed = document.getElementById('feed'); feed.innerHTML = "";
                const posts = []; snapshot.forEach(child => { posts.unshift({id: child.key, ...child.val()}); });
                posts.forEach(p => renderPostUI(p, 'feed'));
            });
        }

        function renderPostUI(p, targetId) {
            const target = document.getElementById(targetId);
            const post = document.createElement('div');
            post.className = 'post';
            let delBtn = (p.user === window.currentUser || window.isCertified) ? `<span onclick="deletePost('${p.id}')" style="cursor:pointer; color:#ff4d4d;">🗑️</span>` : ``;
            let html = `<div class="post-header">
                <div style="display:flex; align-items:center; cursor:pointer;" onclick="voirProfil('${p.user}', '${p.pp}')">
                    <img src="${p.pp}" class="profile-pic-small">
                    <span>@${p.user}</span>
                </div>
                ${delBtn}
            </div><div>${p.text}</div>`;
            if (p.img) html += `<img src="${p.img}" class="post-img">`;
            post.innerHTML = html + actionsHTML(p.id, p.likes || 0);
            target.appendChild(post);
            chargerCommentaires(p.id);
        }

        window.voirProfil = (user, pp) => {
            const isMe = (user === window.currentUser);
            document.getElementById('profil-name').innerText = "@" + user.toLowerCase();
            document.getElementById('profil-pic-big').src = pp;
            document.getElementById('edit-bio-btn').style.display = isMe ? "inline-block" : "none";
            document.getElementById('bio-sticker-btn').style.display = isMe ? "inline-block" : "none";
            document.getElementById('edit-deco-btn').style.display = isMe ? "inline-block" : "none";
            document.getElementById('logout-btn').style.display = isMe ? "inline-block" : "none";
            document.getElementById('banner-box').onclick = isMe ? () => document.getElementById('bannerInput').click() : null;
            onValue(ref(db, 'users/' + user), (snap) => {
                const data = snap.val(); if(!data) return;
                document.getElementById('profil-banner-img').src = data.banner || "https://i.pinimg.com/736x/8d/e2/2e/8de22e28372652155d3b64c185e33433.jpg";
                let bioHTML = data.bio || "Ajoute une biographie...";
                if(data.stickerBio) {
                    const stickers = data.stickerBio.split(',');
                    stickers.forEach(s => { if(s.trim()) bioHTML += `<img src="${s.trim()}" class="sticker">`; });
                }
                document.getElementById('profil-bio').innerHTML = bioHTML;
                const decoImg = document.getElementById('pfp-decoration-img');
                if(data.deco) { decoImg.src = data.deco; decoImg.style.display = "block"; } else { decoImg.style.display = "none"; }
                const cIcon = document.getElementById('cert-icon');
                cIcon.style.color = data.certified ? "#FFD700" : "#1DA1F2";
            });
            const pFeed = document.getElementById('profil-feed'); pFeed.innerHTML = "";
            onValue(ref(db, 'posts'), (snap) => {
                pFeed.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val(); if(p.user === user) renderPostUI({id: child.key, ...p}, 'profil-feed');
                });
            });
            calculerStatsProfil(user);
            showPage('page-profil', true); 
        }

        function calculerStatsProfil(user) {
            onValue(ref(db, 'posts'), (snap) => {
                let count = 0; let likes = 0;
                snap.forEach(p => { if(p.val().user === user) { count++; likes += (p.val().likes || 0); } });
                document.getElementById('count-post').innerText = count;
                document.getElementById('total-likes').innerText = likes;
            });
        }

        window.deletePost = (id) => { if(confirm("Supprimer ce post ?")) remove(ref(db, 'posts/' + id)); }
        window.actionsHTML = (id, likes) => `<div class="post-actions"><span onclick="toggleLike('${id}', this)">🤍 ${likes} J'aime</span><span onclick="document.getElementById('comment-area-${id}').style.display='block'">💬 Commenter</span></div><div id="comment-area-${id}" class="comment-section" style="display:none;"><div id="comments-list-${id}"></div><div class="comment-input-area"><input type="text" id="input-${id}" placeholder="Écrire..."><button onclick="addComment('${id}')">OK</button></div></div>`;
        
        window.toggleLike = (id, el) => {
            const postRef = ref(db, 'posts/' + id);
            get(postRef).then((snap) => {
                let p = snap.val(); let currentLikes = p.likes || 0;
                if (el.innerText.includes("🤍")) { currentLikes++; el.innerHTML = "❤️ " + currentLikes + " J'aimé"; } 
                else { currentLikes--; el.innerHTML = "🤍 " + currentLikes + " J'aime"; }
                update(postRef, { likes: currentLikes });
                const profilName = document.getElementById('profil-name').innerText.replace('@', '');
                calculerStatsProfil(profilName);
            });
        }

        window.addComment = (id, parentId = null) => {
            const inputId = parentId ? `reply-input-${parentId}` : `input-${id}`;
            const input = document.getElementById(inputId); if (!input.value) return;
            const commentData = { user: window.currentUser, text: input.value, timestamp: Date.now() };
            const path = parentId ? `posts/${id}/comments/${parentId}/replies` : `posts/${id}/comments`;
            push(ref(db, path), commentData); input.value = "";
        }

        function chargerCommentaires(postId) {
            onValue(ref(db, `posts/${postId}/comments`), (snapshot) => {
                const list = document.getElementById(`comments-list-${postId}`); if(!list) return;
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const c = child.val(); const cid = child.key;
                    const delBtn = (c.user === window.currentUser || window.isCertified) ? `<button class="del-btn" onclick="deleteComment('${postId}', '${cid}')">✖</button>` : '';
                    const div = document.createElement('div');
                    div.className = 'comment';
                    div.innerHTML = `<span class="comment-user">@${c.user}</span>: ${c.text} ${delBtn} <button class="reply-btn" onclick="showReply('${cid}', '${postId}')">Répondre</button><div id="replies-${cid}" class="replies-container"></div><div id="reply-box-${cid}"></div>`;
                    list.appendChild(div);
                    if(c.replies) {
                        const repCont = div.querySelector(`#replies-${cid}`);
                        Object.keys(c.replies).forEach(rid => {
                            const r = c.replies[rid];
                            const rDelBtn = (r.user === window.currentUser || window.isCertified) ? `<button class="del-btn" onclick="deleteComment('${postId}', '${cid}', '${rid}')">✖</button>` : '';
                            repCont.innerHTML += `<div class="comment"><span class="comment-user">@${r.user}</span>: ${r.text} ${rDelBtn}</div>`;
                        });
                    }
                });
            });
        }

        window.deleteComment = (pid, cid, rid = null) => {
            if(!confirm("Supprimer ce commentaire ?")) return;
            const path = rid ? `posts/${pid}/comments/${cid}/replies/${rid}` : `posts/${pid}/comments/${cid}`;
            remove(ref(db, path));
        }

        window.showReply = (cid, pid) => {
            document.getElementById(`reply-box-${cid}`).innerHTML = `<div class="comment-input-area" style="margin-top:5px;"><input type="text" id="reply-input-${cid}" placeholder="Répondre..."><button onclick="addComment('${pid}', '${cid}')">OK</button></div>`;
        }

        window.showPage = (id, force = false) => { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'page-profil' && !force) { voirProfil(window.currentUser, window.currentProfilePic); }
        }
        
        window.modifierBio = () => { let n = prompt("Ta nouvelle bio ?"); if (n) set(ref(db, 'users/' + window.currentUser + '/bio'), n); }
        window.modifierStickerBio = () => { let s = prompt("Lien stickers (séparés par ,) :"); if(s !== null) set(ref(db, 'users/' + window.currentUser + '/stickerBio'), s); }
        window.modifierDeco = () => { 
            let d = prompt("Lien déco (URL) :"); 
            if(d !== null) {
                set(ref(db, 'users/' + window.currentUser + '/deco'), d);
                const decoImg = document.getElementById('pfp-decoration-img');
                if(d === "") { decoImg.style.display = "none"; } else { decoImg.src = d; decoImg.style.display = "block"; }
            }
        }
        
        window.logout = () => { localStorage.removeItem('nookgram_user'); localStorage.removeItem('nookgram_pass'); location.reload(); }

        window.changeBanner = () => {
            const file = document.getElementById('bannerInput').files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (e) => { update(ref(db, 'users/' + window.currentUser), { banner: e.target.result }); };
                reader.readAsDataURL(file);
            }
        }

        window.changePfpAfterLogin = () => {
            const file = document.getElementById('changePfpInput').files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (e) => { 
                    const newPic = e.target.result;
                    window.currentProfilePic = newPic;
                    document.getElementById('profil-pic-big').src = newPic;
                    document.getElementById('nav-mini-pp').innerHTML = `<img src="${newPic}" style="width:100%; height:100%; object-fit:cover;">`;
                    
                    // 1. Update profil utilisateur
                    update(ref(db, 'users/' + window.currentUser), { pp: newPic });

                    // 2. Update tous les posts de l'utilisateur pour que la PP change partout
                    get(ref(db, 'posts')).then((snap) => {
                        if(snap.exists()){
                            snap.forEach((postChild) => {
                                if(postChild.val().user === window.currentUser){
                                    update(ref(db, 'posts/' + postChild.key), { pp: newPic });
                                }
                            });
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function écouterUtilisateurs() {
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById('online-users-list');
                const groupList = document.getElementById('users-list-group');
                list.innerHTML = ""; groupList.innerHTML = "";
                snapshot.forEach(child => {
                    const u = child.val();
                    if(u.name !== window.currentUser) {
                        let modBtn = window.isCertified ? `<button onclick="deleteAccount('${u.name}')" style="background:#ff4d4d; color:white; border:none; border-radius:10px; padding:5px; cursor:pointer; margin-left:5px;">🚫 Suppr.</button>` : '';
                        list.innerHTML += `<div style="padding:10px; color:#FF1493; display:flex; justify-content:space-between; align-items:center;"><span>● @${u.name} est en ligne</span><div><button onclick="openChat('${u.name}')" style="background:#FF1493; color:white; border:none; border-radius:10px; padding:5px 10px; cursor:pointer;">✉️ Message</button>${modBtn}</div></div>`;
                        groupList.innerHTML += `<div class="user-option" onclick="selectUserForGroup(this)" style="padding:10px; cursor:pointer; color:#FF1493; font-weight:bold; border-radius:10px;">@${u.name}</div>`;
                    }
                });
            });
        }

        window.deleteAccount = (username) => {
            if(confirm("DÉTRUIRE LE COMPTE DE @" + username + " ?")) {
                remove(ref(db, 'users/' + username));
                alert("Compte supprimé.");
            }
        }

        window.openChat = function(target) {
            chatTarget = target;
            document.getElementById('chat-with-name').innerText = "@" + target;
            document.getElementById('chat-window').style.display = "flex";
            const chatId = [window.currentUser, chatTarget].sort().join("_");
            onValue(ref(db, 'direct_messages/' + chatId), (snapshot) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snapshot.forEach(child => {
                    const m = child.val();
                    const mid = child.key;
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${m.sender === window.currentUser ? 'msg-me' : 'msg-them'}`;
                    let content = m.text ? `<div>${m.text}</div>` : "";
                    if(m.photo) content += `<img src="${m.photo}" class="chat-img">`;
                    if(m.sticker) content += `<img src="${m.sticker}" class="sticker">`;
                    if(m.sender === window.currentUser || window.isCertified) {
                        content += `<button class="del-msg-btn" onclick="deleteMsg('${chatId}', '${mid}')">✖</button>`;
                    }
                    div.innerHTML = content; box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
            onValue(ref(db, 'chat_settings/' + chatId + '/background'), (snap) => {
                const bg = snap.val(); const box = document.getElementById('chat-messages');
                box.style.backgroundImage = bg ? `url(${bg})` : "none";
            });
        }

        window.deleteMsg = (chatId, mid) => { if(confirm("Supprimer ?")) remove(ref(db, 'direct_messages/' + chatId + '/' + mid)); }
        window.changeChatBackground = () => {
            const file = document.getElementById('chatBgInput').files[0];
            const chatId = [window.currentUser, chatTarget].sort().join("_");
            if(file){
                const reader = new FileReader(); reader.onload = (e) => set(ref(db, 'chat_settings/' + chatId + '/background'), e.target.result);
                reader.readAsDataURL(file);
            }
        }
        window.ajouterStickerChat = () => { let s = prompt("Lien du sticker :"); if(s) window.currentChatSticker = s; }
        window.closeChat = () => document.getElementById('chat-window').style.display = "none";
        window.sendPrivateMsg = function() {
            const input = document.getElementById('chat-input');
            if (!input.value && !window.currentChatSticker) return;
            const chatId = [window.currentUser, chatTarget].sort().join("_");
            push(ref(db, 'direct_messages/' + chatId), { sender: window.currentUser, text: input.value, sticker: window.currentChatSticker || "", timestamp: Date.now() });
            input.value = ""; window.currentChatSticker = "";
        }
        window.sendPrivatePhoto = () => {
            const file = document.getElementById('chatPhotoInput').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const chatId = [window.currentUser, chatTarget].sort().join("_");
                push(ref(db, 'direct_messages/' + chatId), { sender: window.currentUser, photo: e.target.result, timestamp: Date.now() });
                document.getElementById('chatPhotoInput').value = "";
            };
            reader.readAsDataURL(file);
        }
        window.toggleSearchFriend = () => { let b = document.getElementById('search-friend-bar'); b.style.display = (b.style.display === 'none') ? 'block' : 'none'; }
        window.toggleGroupPopup = () => { let p = document.getElementById('group-popup'); p.style.display = (p.style.display === 'none') ? 'block' : 'none'; }
        window.selectUserForGroup = (el) => { let u = el.innerText; if (selectedUsers.includes(u)) { selectedUsers = selectedUsers.filter(x => x !== u); el.style.background = 'none'; } else { selectedUsers.push(u); el.style.background = '#ffdae9'; } }
        window.validerGroupe = () => { if (selectedUsers.length === 0) return; alert("Groupe créé !"); window.toggleGroupPopup(); document.getElementById('no-msg-text').innerText = "Groupe avec : " + selectedUsers.join(", "); }
    </script>
</body>
</html>
